<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            color: #202124;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #topbar {
            background: white;
            padding: 10px 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 14px 20px;
            font-size: 17px;
            border: 1px solid #dfe1e5;
            border-radius: 50px;
            outline: none;
        }
        input:focus {
            border-color: #4285f4;
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
        }
        button {
            padding: 12px 24px;
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #f1f3f4;
            border-color: #dadce0;
        }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }
        #status {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 14px;
            padding: 6px 12px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="topbar">
        <input type="text" id="urlBar" placeholder="Search or type a URL" autocomplete="off">
        <button onclick="navigate()">Go</button>
        <button onclick="goHome()">Home</button>
    </div>

    <iframe id="frame"></iframe>

    <div id="status">Loading proxy...</div>

    <script>
        const PROXY_PREFIX = '/proxy/';

        async function registerSW() {
            if (!('serviceWorker' in navigator)) {
                document.getElementById('status').textContent = '❌ Service Workers not supported';
                return;
            }

            try {
                await navigator.serviceWorker.register('/sw.js');
                document.getElementById('status').textContent = '✅ Proxy Active';
                goHome();
            } catch (err) {
                document.getElementById('status').innerHTML = 
                    '❌ SW Failed<br><small>Make sure sw.js is in root folder</small>';
            }
        }

        function isUrl(input) {
            input = input.trim();
            if (/^https?:\/\//i.test(input)) return true;
            if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(input)) return true;
            if (/^\d{1,3}(\.\d{1,3}){3}/.test(input)) return true;
            return false;
        }

        function navigate() {
            let input = document.getElementById('urlBar').value.trim();
            if (!input) return;

            let target = isUrl(input) 
                ? (input.startsWith('http') ? input : 'https://' + input)
                : 'https://duckduckgo.com/?q=' + encodeURIComponent(input);

            document.getElementById('frame').src = PROXY_PREFIX + target;
        }

        function goHome() {
            document.getElementById('frame').src = PROXY_PREFIX + 'https://duckduckgo.com';
        }

        // Enter key
        document.getElementById('urlBar').addEventListener("keypress", e => {
            if (e.key === "Enter") navigate();
        });

        window.onload = registerSW;
    </script>
</body>
</html>
